; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ESP32_S3_DEVKITC_1]
platform = espressif32
framework = arduino
;platform = https://github.com/Seeed-Studio/platform-seeedboards.git
;board = seeed-xiao-esp32-c6
;board = esp32-c6-devkitm-1
board = esp32-s3-devkitm-1

;board_build.arduino.memory_type = qio_qspi
;board_build.flash_mode = qio
;board_build.psram_type = qspi
;board_upload.flash_size = 16MB
;board_upload.maximum_size = 16777216
;board_build.partitions = default_16MB.csv
;board_build.extra_flags = 
;  -DBOARD_HAS_PSRAM
board_build.partitions = src/partitions.csv

upload_speed = 921600
monitor_speed = 115200
monitor_eol = CRLF
monitor_filters = esp32_exception_decoder

;upload_protocol = espota
;upload_port = 192.168.251.50
;upload_port = ESP32_PIRa.local
;upload_flags =
;    --auth=Corail2025
;    --progress

;lib_ldf_mode = chain+

build_flags = 
  -Wl,-Map,firmware.map

lib_deps =
  bblanchon/ArduinoJson
  ClosedCube/ClosedCube HDC1080 @ ^1.1.1
  ESP32Async/AsyncTCP 
  ESP32Async/ESPAsyncWebServer
  https://github.com/br3ttb/Arduino-PID-Library.git
  adafruit/DHT sensor library @ ^1.4.3
  https://github.com/gilmaimon/ArduinoWebsockets.git
